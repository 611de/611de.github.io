<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <div class="site-footer-inner">
        {%- assign currentYear = 'now' | date: "%Y" -%}
        {%- assign copyright = site.copyright
            | replace: '{currentYear}', currentYear
            | replace: '{author}', site.author
            | replace: '(c)', '&copy;'
            | replace: '(p)', '℗'
            | replace: '(cleft)', '<span class="copyleft">&copy;</span>'
        -%}
      <div>{{ copyright }}</div>
      <div>由 <a title="静态网站生成器 Jekyll" href="https://jekyllrb.com/">Jekyll</a> 和 <a title="Yat 博客主题" href="https://github.com/jeffreytse/jekyll-theme-yat">Yat Theme</a> 驱动。</div>
      <div class="footer-col rss-subscribe"><a href="{{ "/feed.xml" | relative_url }}">订阅 RSS</a></div>
    </div>
  </div>
</footer>
