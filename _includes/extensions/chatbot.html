<button
  id="article-assistant-toggle"
  class="article-assistant-toggle"
  type="button"
  aria-label="打开文章阅读助手"
  aria-expanded="false"
  aria-controls="article-assistant"
>
  <i class="fa fa-comment-o" aria-hidden="true"></i>
  <span class="sr-only">问这篇文章</span>
</button>

<section
  id="article-assistant"
  class="article-assistant"
  role="dialog"
  aria-labelledby="article-assistant-title"
  hidden
>
  <header class="article-assistant-header">
    <div>
      <p class="article-assistant-kicker">阅读助手</p>
      <h2 id="article-assistant-title">快速理解这篇文章</h2>
    </div>
    <button id="article-assistant-close" class="article-assistant-close" type="button" aria-label="关闭阅读助手">×</button>
  </header>

  <div id="article-assistant-messages" class="article-assistant-messages" aria-live="polite">
    <div class="assistant-message assistant-message-system">
      我可以根据当前文章回答问题，也能整理概览、生成目录或定位关键词。
    </div>
  </div>

  <div class="article-assistant-actions" aria-label="快捷操作">
    <button type="button" data-assistant-action="summary">内容概览</button>
    <button type="button" data-assistant-action="outline">本文目录</button>
    <button type="button" data-assistant-action="related">相关文章</button>
  </div>

  <form id="article-assistant-form" class="article-assistant-form">
    <label class="sr-only" for="article-assistant-input">搜索文章内容</label>
    <input
      id="article-assistant-input"
      type="search"
      maxlength="80"
      autocomplete="off"
      placeholder="输入关于本文的问题"
    >
    <button type="submit" aria-label="搜索本文">
      <i class="fa fa-search" aria-hidden="true"></i>
    </button>
  </form>
</section>

<script src="{{ '/assets/js/chatbot_llm.js' | relative_url }}" defer></script>
